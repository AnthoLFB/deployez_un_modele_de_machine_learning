name: "OC | P5 : Déployez un modèle de Machine Learning | Déploiement vers Hugging Face"

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Git user configuration
        run: |
          git config --global user.email "antho.lefebvre@outlook.fr"
          git config --global user.name "AnthoLFB"

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

        run: |
          git remote remove space || true
          git remote add space https://user:$HF_TOKEN@huggingface.co/spaces/AnthoLFB/deployez_un_modele_de_machine_learning
          
          git pull space main --rebase || true
          git push space main